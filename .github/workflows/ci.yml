# .github/workflows/ci.yml — NEW: CI pipeline for TwihugureHub
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: twihugurehub
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: twihugurehub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://twihugurehub:secret@localhost:5432/twihugurehub_test
      NEXTAUTH_SECRET: ci-test-secret-32-chars-padding-ok
      NEXTAUTH_URL: http://localhost:3000
      ENCRYPTION_SECRET: 00000000000000000000000000000000
      AI_PROVIDER: anthropic
      AI_MODEL: claude-sonnet-4-20250514
      AI_API_KEY: ${{ secrets.AI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run unit and integration tests
        run: npm test -- --passWithNoTests --forceExit

      - name: Build Next.js
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start app for E2E
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
